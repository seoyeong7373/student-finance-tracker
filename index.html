<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Finance Tracker</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #e0f2fe);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      color: #111827;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 24px 0;
      text-align: center;
      color: #4b5563;
      font-size: 14px;
    }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #374151;
      margin: 18px 0 8px 0;
    }

    label {
      display: block;
      font-size: 13px;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .results {
      margin-top: 22px;
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      color: #1f2937;
    }

    .result-row:last-child {
      margin-bottom: 0;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
    }

    .good {
      background: #dcfce7;
      color: #166534;
    }

    .warning {
      background: #fef3c7;
      color: #92400e;
    }

    .danger {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Student Finance Tracker</h1>
    <p class="subtitle">A simple budgeting tool for high school students</p>

    <div class="section-title">Monthly Budget</div>
    <label for="budget">Enter your total monthly budget</label>
    <input type="number" id="budget" placeholder="e.g. 500" />

    <div class="section-title">Expenses</div>
    <label for="food">Food</label>
    <input type="number" id="food" placeholder="e.g. 120" />

    <label for="shopping">Shopping</label>
    <input type="number" id="shopping" placeholder="e.g. 80" />

    <label for="transport">Transport</label>
    <input type="number" id="transport" placeholder="e.g. 40" />

    <button onclick="calculateBudget()">Calculate My Budget</button>

    <div class="results">
      <div class="result-row">
        <span>Total Expenses</span>
        <span id="totalExpenses">$0</span>
      </div>
      <div class="result-row">
        <span>Remaining Budget</span>
        <span id="remainingBudget">$0</span>
      </div>
      <div id="statusMessage" class="status good">Enter your numbers to get started.</div>
    </div>
  </div>

  <script>
    function calculateBudget() {
      const budget = Number(document.getElementById("budget").value) || 0;
      const food = Number(document.getElementById("food").value) || 0;
      const shopping = Number(document.getElementById("shopping").value) || 0;
      const transport = Number(document.getElementById("transport").value) || 0;

      const totalExpenses = food + shopping + transport;
      const remaining = budget - totalExpenses;

      document.getElementById("totalExpenses").textContent = "$" + totalExpenses;
      document.getElementById("remainingBudget").textContent = "$" + remaining;

      const statusBox = document.getElementById("statusMessage");

      if (remaining > 100) {
        statusBox.textContent = "Great job! You are staying within your budget.";
        statusBox.className = "status good";
      } else if (remaining >= 0) {
        statusBox.textContent = "Be careful. You are getting close to your budget limit.";
        statusBox.className = "status warning";
      } else {
        statusBox.textContent = "You are over budget. Try reducing your spending.";
        statusBox.className = "status danger";
      }
    }
  </script>
</body>
</html>
